    </iframe> </section>  </main> <script type="module">
      import anime, { onScroll } from "animejs";

      const header = document.querySelector("header");
      const brand = document.querySelector(".brand");
      const navLinks = document.querySelectorAll(".nav-links a");
      const heroTitle = document.querySelector("h1");
      const revealTargets = document.querySelectorAll(".reveal-on-scroll");
      const galleryImages = document.querySelectorAll(".photo-grid img");

      anime
        .timeline({
          easing: "easeOutExpo",
          duration: 700,
        })
        .add({
          targets: header,
          opacity: [0, 1],
          translateY: [-32, 0],
        })
        .add(
          {
            targets: brand,
            opacity: [0, 1],
            translateY: [-18, 0],
          },
          "-=620"
        )
        .add(
          {
            targets: navLinks,
            opacity: [0, 1],
            translateY: [-18, 0],
            delay: anime.stagger(80),
          },
          "-=620"
        )
        .add(
          {
            targets: heroTitle,
            opacity: [0, 1],
            translateY: [32, 0],
            scale: [0.96, 1],
          },
          "-=520"
        );

      revealTargets.forEach((element) => {
        element.style.opacity = 0;
        element.style.transform = "translateY(24px)";
        anime({
          targets: element,
          opacity: [0, 1],
          translateY: [24, 0],
          duration: 700,
          easing: "easeOutExpo",
          delay: anime.stagger(90),
          autoplay: onScroll({ threshold: 0.24 }),
        });
      });

      anime({
        targets: galleryImages,
        opacity: [0, 1],
        translateY: [28, 0],
        scale: [0.98, 1],
        delay: anime.stagger(120),
        easing: "easeOutExpo",
        duration: 700,
      });

      anime({
        targets: "body",
        backgroundPosition: ["0% 0%", "0% 6%"],
        duration: 16000,
        easing: "linear",
        direction: "alternate",
        loop: true,
      });
    </script> </body> </html>
